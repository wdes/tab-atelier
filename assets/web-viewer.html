<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Share links must not be indexed: leaked URL → indexed URL ==
       leaked terminal. The HTTP `X-Robots-Tag` header (set server
       side on every route) is the load-bearing guard; this meta tag
       is the belt to that suspenders so a saved-page or proxy that
       strips headers still tells crawlers to back off. -->
  <meta name="robots" content="noindex, nofollow, noarchive">
  <title>__TAB_NAME_HTML__ · tab-atelier</title>
  <!-- xterm.js + .css are version-pinned and served by the daemon.
       Cache-Control on those routes is `immutable` since the URL
       has the version in it. -->
  <link rel="stylesheet" href="/assets/xterm-6.0.0.css">
  <!-- Our own CSS + JS are served with `?version=<BUILD_HASH>` so
       a deb upgrade invalidates the cache atomically — browsers
       fetch the new content on the very next view load, no manual
       refresh dance. Server treats the query string as a cache
       buster only; the route itself ignores it. -->
  <link rel="stylesheet" href="/assets/main.css?version=__BUILD_HASH__">
</head>
<!-- The per-tab background colour is injected as a CSS custom
     property so main.css can reference it via `var(--tab-bg)`
     without needing template substitution at request time. -->
<body style="--tab-bg: __TAB_BG__">
  <div id="locked-banner">🔒 TAB LOCKED — INPUT DISABLED</div>
  <div id="term"></div>
  <div id="status">connecting…</div>
  <div id="update-chip" title="The server was upgraded — click to reload this viewer">↻ update available</div>
  <!-- Copy button — visible only while a terminal selection exists.
       Clicking it writes term.getSelection() to the clipboard
       without depending on xterm.js's selection surviving the next
       term.write(), which the polling refresh otherwise nukes. -->
  <button id="copy-btn" title="Copy the highlighted text to clipboard">📋 Copy selection</button>
  <!-- Persistent top-left keyboard toggle. On touch devices the soft
       keyboard disappears whenever focus leaves the xterm.js helper
       textarea (tap on the toolbar, swipe, screen rotation, …). This
       button is the always-available way to ask for it back. On
       desktop it's a hint to the user that the textarea is focusable. -->
  <button id="kbd-toggle" title="Show / focus keyboard">⌨</button>
  <!-- Mobile keyboard toolbar (rendered only when ontouchstart and an
       IME is up). Ported from the Slint KeyboardHeader on the Android
       ta-remote app so mobile web viewers get the same toolbar. -->
  <div id="mobile-kbd-header" aria-hidden="true"></div>
  <div id="files-controls">
    <button id="outbox-btn" class="files-btn" title="Files agent has placed in outbox/ for download">⬇ outbox<span class="badge" id="outbox-badge">0</span></button>
    <button id="inbox-btn" class="files-btn" title="Files you've uploaded to inbox/ — drag the path into Claude">⬆ inbox<span class="badge" id="inbox-badge">0</span></button>
  </div>
  <div id="drop-overlay"><div class="inner">drop file to upload to <code>inbox/</code></div></div>
  <div id="files-panel">
    <span class="close" id="files-close" title="Close">×</span>
    <h3 id="files-title">outbox/</h3>
    <div class="dir" id="files-dir" title="Click to copy the absolute path"></div>
    <div id="files-list">loading…</div>
    <div class="hint" id="files-hint"></div>
  </div>
  <div id="toast"></div>
  <script src="/assets/xterm-6.0.0.js"></script>
  <!-- Bootstrap: only thing in /view that's tab-specific. main.js
       reads window.TAB and is otherwise identical across every
       tab + every browser load (= cacheable behind ?version=). -->
  <script>
    window.TAB = {
      key: "__TAB_KEY__",
      name: "__TAB_NAME_JS__",
      bg: "__TAB_BG__",
      buildHash: "__BUILD_HASH__",
    };
  </script>
  <script src="/assets/main.js?version=__BUILD_HASH__"></script>
</body>
</html>
