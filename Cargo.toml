[package]
name = "tab-atelier"
version = "0.1.0"
edition = "2024"
license = "MPL-2.0"

[dependencies]
alacritty_terminal = "0.26"
gpui = { version = "0.2", default-features = false, features = ["x11"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
x11rb = { version = "0.13", features = ["allow-unsafe-code"] }
qrcode = { version = "0.14", default-features = false }
ureq = { version = "3", features = ["json"] }
vte = { version = "0.15", default-features = false, features = ["std", "ansi"] }
wattaouille = { path = "../wattaouille" }
