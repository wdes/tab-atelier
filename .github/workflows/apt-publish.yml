name: Publish apt repo

# Two channels:
#  * `stable`  — populated when a `v*` tag is pushed. The package
#    version is whatever Cargo.toml says (the `release.yml` tag flow
#    is expected to bump that to the release version).
#  * `nightly` — populated on every push to `main`. The package
#    version is rewritten on the fly to
#        <base>~nightly<UTC YYYYMMDD>.<UTC HHMMSS>-1
#    `~` is the Debian pre-release separator (Debian Versioning
#    wiki) so e.g. `0.4.0~nightly20260527.123000` sorts strictly
#    BEFORE `0.4.0`. That gives users a "track main" channel that
#    auto-downgrades-and-upgrades when a stable lands.
#
# Single output: a Debian "pool" repo on the `gh-pages` branch,
# served from https://deb.tab-atelier.wdes.eu/ (CNAME → GH Pages).
# Signed with the key whose private half lives in the
# `APT_SIGNING_KEY` repo secret.

on:
    push:
        branches: [main]
        tags: ['v*']
    # Manual trigger so the windows-msi.yml workflow can chain into a
    # republish after it finishes (push-driven apt-publish often races
    # the parallel windows-msi build and picks the previous MSI run).
    workflow_dispatch:

permissions:
    contents: write
    actions: read # download the latest windows-msi artifact for /windows/

env:
    RUST_VERSION: "1.95.0"

jobs:
    publish:
        name: Build .debs + publish to gh-pages
        runs-on: ubuntu-latest
        # Skip if the commit is a `[skip apt]` chore (e.g. README-only
        # tweaks from the release workflow itself).
        if: ${{ !contains(github.event.head_commit.message, '[skip apt]') }}
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0
            - name: Decide channel + version
              id: ver
              run: |
                  if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
                      CHANNEL=stable
                      VERSION="${GITHUB_REF#refs/tags/v}"
                  else
                      CHANNEL=nightly
                      BASE=$(grep -m1 '^version = ' Cargo.toml | cut -d'"' -f2 | sed 's/-dev$//')
                      DATE=$(date -u +%Y%m%d.%H%M%S)
                      VERSION="${BASE}~nightly${DATE}-1"
                  fi
                  echo "channel=$CHANNEL" >> $GITHUB_OUTPUT
                  echo "version=$VERSION" >> $GITHUB_OUTPUT
                  echo "→ publishing $VERSION to $CHANNEL"

            - name: Install system dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y --no-install-recommends \
                      build-essential \
                      libvulkan-dev libwayland-dev libxkbcommon-dev \
                      libxkbcommon-x11-dev libx11-dev libxcb1-dev \
                      libxcb-render0-dev libxcb-shm0-dev libxcb-xkb-dev \
                      libfontconfig-dev libfreetype-dev \
                      apt-utils gnupg
            - uses: dtolnay/rust-toolchain@stable
              with:
                  toolchain: ${{ env.RUST_VERSION }}
            - uses: Swatinem/rust-cache@v2

            - name: Build .deb (both variants)
              run: |
                  cargo install cargo-deb --locked
                  cargo deb -p tab-atelier --locked --deb-version "${{ steps.ver.outputs.version }}"
                  cargo deb -p tab-atelier --variant headless --locked --deb-version "${{ steps.ver.outputs.version }}"
                  ls -la target/debian/

            # Pull the existing gh-pages tree into site/ so the
            # next steps can prune + regenerate against it. First
            # run on a fresh repo: the branch doesn't exist; we
            # init an empty site/ instead. peaceiris/actions-gh-pages
            # at the end handles the orphan-branch case for the
            # actual push, so this step just gets the prior state
            # in front of us.
            - name: Fetch existing gh-pages state
              env:
                  GH_TOKEN_X: ${{ github.token }}
              run: |
                  REMOTE="https://x-access-token:${GH_TOKEN_X}@github.com/${{ github.repository }}.git"
                  rm -rf site
                  if git ls-remote --heads "$REMOTE" gh-pages | grep -q '\<gh-pages$'; then
                      echo "→ gh-pages exists upstream — clone shallow"
                      git clone --depth=1 -b gh-pages --single-branch "$REMOTE" site
                  else
                      echo "→ gh-pages does NOT exist — start with empty site/"
                      mkdir -p site
                  fi

            - name: Drop .debs into pool/
              env:
                  CHANNEL: ${{ steps.ver.outputs.channel }}
              run: |
                  cd site
                  mkdir -p pool/$CHANNEL/main/t/tab-atelier
                  cp ../target/debian/*.deb pool/$CHANNEL/main/t/tab-atelier/
                  # Cap the pool at the 10 most recent .debs per package
                  # so the repo doesn't balloon forever. Sort by mtime
                  # then prune the tail.
                  for pkg in tab-atelier tab-atelier-headless; do
                      ls -1t pool/$CHANNEL/main/t/tab-atelier/${pkg}_*.deb 2>/dev/null \
                          | tail -n +11 | xargs -r rm -f
                  done

            # Windows MSIs are built on a windows runner by
            # windows-msi.yml and can't be produced here. Pull the .msi
            # from the most recent successful run into site/windows/ and
            # regenerate that folder's index. The gh-pages clone above
            # already preserved any previously-published MSIs, so if no
            # fresh artifact is found the existing set just carries over.
            #
            # `gh run download` would be the obvious tool but it assumes
            # actions/upload-artifact@v7 wraps single files in a zip;
            # v7 actually ships them BARE (we verified: the artifact
            # bytes start with the MSI OLE2 magic `d0cf 11e0`, not the
            # zip magic `50 4b 03 04`), which makes `gh run download`
            # error out with "zip: not a valid zip file" and leave
            # site/windows/ empty. Use the artifacts API directly:
            # the `/zip` endpoint returns whatever was uploaded — for
            # single-file v7 artifacts, that's the file itself, named
            # after the artifact.
            - name: Find latest Windows MSI run
              id: msi_run
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  RUN_ID=$(gh run list --repo "$GITHUB_REPOSITORY" \
                      --workflow=windows-msi.yml --status=success \
                      -L 1 --json databaseId --jq '.[0].databaseId // empty')
                  echo "run_id=${RUN_ID}" >> "$GITHUB_OUTPUT"
                  if [ -n "$RUN_ID" ]; then
                      echo "→ will pull MSIs from windows-msi run $RUN_ID"
                  else
                      echo "→ no successful windows-msi run yet; keeping existing MSIs"
                  fi
            - name: Stage MSI artifacts + regenerate index
              env:
                  GH_TOKEN: ${{ github.token }}
                  RUN_ID: ${{ steps.msi_run.outputs.run_id }}
              run: |
                  cd site
                  mkdir -p windows
                  if [ -n "$RUN_ID" ]; then
                      # Walk every artifact on that run, fetch the raw
                      # bytes via the API (NOT via gh run download —
                      # see comment on the previous step). Each
                      # artifact's `name` is already the destination
                      # filename, including the .msi extension.
                      # The artifact zip endpoint returns a 302 to a
                      # presigned S3 URL. `gh api` doesn't follow
                      # redirects (exits 1 instead) — use curl -fL
                      # with the same token. `set -o pipefail` further
                      # up would otherwise nuke the whole step on a
                      # single failed fetch; loop with explicit
                      # || true so one transient hiccup doesn't lose
                      # the rest of the artifacts. Each MSI is
                      # validated post-download against the MSI OLE2
                      # magic to catch silent half-writes.
                      gh api "repos/$GITHUB_REPOSITORY/actions/runs/$RUN_ID/artifacts" \
                          --jq '.artifacts[] | "\(.id)\t\(.name)"' \
                      | while IFS=$'\t' read -r ID NAME; do
                          case "$NAME" in
                              *.msi)
                                  TMP="windows/$NAME.partial"
                                  echo "→ fetching artifact $ID → windows/$NAME"
                                  # Capture curl's stderr so a silent
                                  # failure leaves a breadcrumb in the
                                  # job log; the previous "✗ curl
                                  # failed" line gave no detail. -w
                                  # echoes status + size so an HTTP
                                  # 401/404 is obvious.
                                  # No `Accept: application/octet-stream` —
                                  # the artifact API replies 415 to that. The
                                  # endpoint returns a 302 to a presigned S3
                                  # URL regardless of Accept; curl -L follows
                                  # it and S3 sends the raw bytes.
                                  if curl -fSL --write-out 'http=%{http_code} bytes=%{size_download}\n' \
                                      -H "Authorization: Bearer $GH_TOKEN" \
                                      -H "X-GitHub-Api-Version: 2022-11-28" \
                                      -o "$TMP" \
                                      "https://api.github.com/repos/$GITHUB_REPOSITORY/actions/artifacts/$ID/zip" \
                                  ; then
                                      # MSIs start with the OLE2 CFB
                                      # magic D0 CF 11 E0. Anything
                                      # else (404 HTML, an actual
                                      # zip, …) gets rejected so the
                                      # site never serves a broken
                                      # download.
                                      if head -c 4 "$TMP" | od -An -tx1 | tr -d ' \n' | grep -q '^d0cf11e0$'; then
                                          mv "$TMP" "windows/$NAME"
                                      else
                                          echo "  ✗ wrong magic on $NAME — discarding"
                                          rm -f "$TMP"
                                      fi
                                  else
                                      echo "  ✗ curl failed for artifact $ID — skipping"
                                      rm -f "$TMP"
                                  fi
                                  ;;
                              *) echo "→ skipping non-MSI artifact: $NAME" ;;
                          esac
                      done
                  fi
                  # Cap at the 10 most recent MSIs.
                  ls -1t windows/*.msi 2>/dev/null | tail -n +11 | xargs -r rm -f
                  # Regenerate the folder index (newest first).
                  {
                      echo '<!DOCTYPE html><meta charset=utf-8><title>tab-atelier Windows builds</title>'
                      echo '<style>body{font-family:system-ui;max-width:48em;margin:3em auto;padding:0 1em}'
                      echo 'code{background:#f4f4f4;padding:.1em .3em;border-radius:3px}'
                      echo 'pre{background:#f4f4f4;padding:.6em .8em;border-radius:4px;overflow-x:auto}'
                      echo '.note{background:#fff8d6;border-left:3px solid #d9a900;padding:.6em .9em;margin:1em 0;font-size:.95em}</style>'
                      echo '<h1>tab-atelier Windows builds</h1>'
                      echo '<p>Headless daemon MSI installers (<code>tab-atelier-headless</code>), newest first. Each filename carries the commit short SHA.</p>'
                      echo '<ul>'
                      for f in $(ls -1t windows/*.msi 2>/dev/null); do
                          bn=$(basename "$f")
                          sz=$(du -h "$f" | cut -f1)
                          echo "<li><a href=\"$bn\">$bn</a> &mdash; $sz</li>"
                      done
                      echo '</ul>'
                      echo '<h2>Installing</h2>'
                      echo '<p>From an elevated <code>cmd.exe</code> or PowerShell (run as Administrator), in the folder where you downloaded the MSI:</p>'
                      echo '<pre>msiexec /i tab-atelier-headless-XXXXXXXX-0.4.0-x86_64.msi /qb</pre>'
                      echo '<p><code>/qb</code> shows a basic progress bar without TaskDialog; <code>/qn</code> is fully silent. Both bypass the legacy Windows installer chrome.</p>'
                      echo '<div class="note"><strong>If double-click install fails with “entrypoint TaskDialogIndirect can not be found in dynamic link library”:</strong> your shell is loading the legacy comctl32 v5 instead of v6. Use the <code>/qb</code> or <code>/qn</code> command-line install above &mdash; it does not invoke TaskDialog at all.</div>'
                      echo '<p><a href="../">&larr; back to the apt repo</a></p>'
                  } > windows/index.html

            - name: Regenerate Packages + Release
              env:
                  CHANNEL: ${{ steps.ver.outputs.channel }}
              run: |
                  cd site
                  mkdir -p dists/$CHANNEL/main/binary-amd64
                  apt-ftparchive --arch amd64 packages pool/$CHANNEL/ \
                      > dists/$CHANNEL/main/binary-amd64/Packages
                  gzip -9 --force --keep dists/$CHANNEL/main/binary-amd64/Packages
                  cat > apt-ftparchive-$CHANNEL.conf <<EOF
                  APT::FTPArchive::Release::Origin "tab-atelier";
                  APT::FTPArchive::Release::Label "tab-atelier";
                  APT::FTPArchive::Release::Suite "$CHANNEL";
                  APT::FTPArchive::Release::Codename "$CHANNEL";
                  APT::FTPArchive::Release::Architectures "amd64";
                  APT::FTPArchive::Release::Components "main";
                  APT::FTPArchive::Release::Description "tab-atelier $CHANNEL channel";
                  EOF
                  apt-ftparchive -c apt-ftparchive-$CHANNEL.conf release \
                      dists/$CHANNEL/ > dists/$CHANNEL/Release
                  rm apt-ftparchive-$CHANNEL.conf

            # Import the apt signing key into the runner's GPG
            # keyring AND configure git to use it for commit
            # signatures. The same key signs both the apt Release
            # file AND the gh-pages commits — anyone with the
            # public key (curlable from deb.tab-atelier.wdes.eu)
            # can verify both ends with one trust anchor.
            - name: Import GPG signing key
              id: gpg
              uses: crazy-max/ghaction-import-gpg@v7
              with:
                  gpg_private_key: ${{ secrets.APT_SIGNING_KEY }}
                  fingerprint: ${{ secrets.APT_SIGNING_KEY_ID }}
                  git_user_signingkey: true
                  git_commit_gpgsign: true
                  git_committer_name: 'Wdes Bot'
                  git_committer_email: 'williamdes+wdes-bot@wdes.fr'

            - name: Sign Release
              env:
                  CHANNEL: ${{ steps.ver.outputs.channel }}
                  GPG_KEY_ID: ${{ steps.gpg.outputs.fingerprint }}
              run: |
                  cd site
                  gpg --batch --yes --local-user "$GPG_KEY_ID" \
                      --output dists/$CHANNEL/Release.gpg \
                      --detach-sign dists/$CHANNEL/Release
                  gpg --batch --yes --local-user "$GPG_KEY_ID" --clearsign \
                      --output dists/$CHANNEL/InRelease \
                      dists/$CHANNEL/Release
                  # Public key is republished on every run so a
                  # re-key propagates automatically to users on
                  # their next `apt update`.
                  gpg --batch --yes --armor --export "$GPG_KEY_ID" \
                      > tab-atelier.gpg

            - name: Write CNAME + landing page
              run: |
                  cd site
                  echo "deb.tab-atelier.wdes.eu" > CNAME
                  cat > index.html <<'HTML'
                  <!DOCTYPE html><meta charset=utf-8><title>tab-atelier apt repo</title>
                  <style>
                  body{font-family:system-ui;max-width:48em;margin:3em auto;padding:0 1em}
                  /* pre-wrap + overflow-wrap means long single-line commands
                     wrap visually in the browser but stay ONE logical line
                     when copy-pasted — terminals never see a literal \
                     continuation that they might mishandle. */
                  pre{background:#f4f4f4;padding:1em;border-radius:4px;white-space:pre-wrap;overflow-wrap:anywhere}
                  code{background:#f4f4f4;padding:.1em .3em;border-radius:3px}
                  .note{background:#fff8d6;border-left:3px solid #d9a900;padding:.6em .9em;margin:1em 0;font-size:.95em}
                  .channel{margin:1em 0;padding:.8em 1em;background:#eef3fb;border-radius:4px;display:flex;gap:1.2em;align-items:center;flex-wrap:wrap}
                  .channel label{cursor:pointer;font-weight:500}
                  [data-channel].hidden{display:none}
                  </style>
                  <h1>tab-atelier apt repo</h1>

                  <div class="channel" role="radiogroup" aria-label="channel">
                    Channel:
                    <label><input type="radio" name="channel" value="stable" checked> stable (release builds)</label>
                    <label><input type="radio" name="channel" value="nightly"> nightly (every push to <code>main</code>)</label>
                  </div>

                  <h2>First-time install</h2>
                  <p>Debian / Ubuntu — paste each line into a terminal:</p>
                  <pre data-channel="stable">curl -fsSL https://deb.tab-atelier.wdes.eu/tab-atelier.gpg | sudo gpg --dearmor -o /usr/share/keyrings/tab-atelier.gpg
                  echo "deb [signed-by=/usr/share/keyrings/tab-atelier.gpg] https://deb.tab-atelier.wdes.eu stable main" | sudo tee /etc/apt/sources.list.d/tab-atelier.list > /dev/null
                  sudo apt update
                  sudo apt install tab-atelier</pre>
                  <pre data-channel="nightly" class="hidden">curl -fsSL https://deb.tab-atelier.wdes.eu/tab-atelier.gpg | sudo gpg --dearmor -o /usr/share/keyrings/tab-atelier.gpg
                  echo "deb [signed-by=/usr/share/keyrings/tab-atelier.gpg] https://deb.tab-atelier.wdes.eu nightly main" | sudo tee /etc/apt/sources.list.d/tab-atelier.list > /dev/null
                  sudo apt update
                  sudo apt install tab-atelier</pre>

                  <h2>Upgrade an existing install</h2>
                  <pre>sudo apt update &amp;&amp; sudo apt install --only-upgrade tab-atelier</pre>
                  <p>Works on both channels — apt re-reads <code>/etc/apt/sources.list.d/tab-atelier.list</code> on every <code>apt update</code>. To swap channels on an existing install, re-run the first-time-install block with the channel you want; it overwrites the same file.</p>

                  <p>For the headless variant, swap <code>tab-atelier</code> for <code>tab-atelier-headless</code> in the install or upgrade command.</p>
                  <div class="note">
                  <strong><code>gpg --dearmor</code> handles older apt:</strong> the published key is ASCII-armored. <code>apt 2.4+</code> accepts both armored and binary keyrings in <code>/usr/share/keyrings/</code>; <code>apt &lt; 2.4</code> (Debian 11 buster &amp; older, Ubuntu 20.04 focal) requires binary. The <code>gpg --dearmor</code> step converts to binary in place, so the same one-liner works on every supported release.
                  </div>
                  <h2>Windows</h2>
                  <p>Headless MSI installers for Windows are at <a href="/windows/">/windows/</a>.</p>
                  <p>Source: <a href="https://github.com/wdes/tab-atelier">github.com/wdes/tab-atelier</a>.</p>

                  <script>
                  // Channel picker — toggles which `<pre data-channel="…">`
                  // block is visible. Each pre carries the same body modulo
                  // "stable" → "nightly", so selecting a channel swaps the
                  // visible snippet without touching the copy text.
                  document.querySelectorAll('input[name="channel"]').forEach(function (r) {
                    r.addEventListener('change', function (e) {
                      var ch = e.target.value;
                      document.querySelectorAll('[data-channel]').forEach(function (el) {
                        el.classList.toggle('hidden', el.dataset.channel !== ch);
                      });
                    });
                  });
                  </script>
                  HTML

            # peaceiris/actions-gh-pages handles the orphan branch
            # case (first run) and the push. The commit it creates
            # picks up the global git config crazy-max set above —
            # so `git commit` runs with commit.gpgsign=true and
            # user.signingkey = the apt key fingerprint. Result:
            # every gh-pages commit shows up as Verified on GitHub,
            # signed by the same key that signs the apt Release.
            # `keep_files: false` means the action REPLACES gh-pages
            # with our `site/` tree wholesale — pruning + the prior
            # checkout above gave us exactly the desired final
            # state, so wipe-and-replace is the right behaviour.
            - name: Publish to gh-pages
              uses: peaceiris/actions-gh-pages@v4
              with:
                  github_token: ${{ secrets.GITHUB_TOKEN }}
                  publish_dir: ./site
                  publish_branch: gh-pages
                  user_name: 'Wdes Bot'
                  user_email: 'williamdes+wdes-bot@wdes.fr'
                  commit_message: 'Publish ${{ steps.ver.outputs.version }} to ${{ steps.ver.outputs.channel }}'
                  keep_files: false
