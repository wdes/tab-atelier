name: windows-msi

# Builds the headless Windows binaries and packages them into an MSI,
# emitted as a raw (un-zipped) build artifact named with the short commit
# SHA — the Windows analogue of the per-build .deb naming. No GitHub
# (pre)release is created.
#
# Run it on demand (Actions tab -> windows-msi -> Run workflow), or push
# a vX.Y.Z tag to build a tagged MSI artifact.

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  msi:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust (stable, MSVC)
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Compute MSI version + short SHA
        shell: bash
        run: |
          # MSI ProductVersion must be numeric (x.y.z); the Cargo version
          # is "0.4.0-dev", so derive from the tag or fall back.
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "MSI_VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_ENV"
          else
            echo "MSI_VERSION=0.4.0" >> "$GITHUB_ENV"
          fi
          # Short commit SHA — uniquely identifies each build, like the
          # ~nightly<timestamp> suffix the .debs carry.
          echo "SHORT_SHA=${GITHUB_SHA::8}" >> "$GITHUB_ENV"

      - name: Build headless binary
        shell: bash
        run: |
          # Explicit -p so the Linux-only catbus-agent workspace member
          # (in default-members) is NOT built. catbus + energy features
          # are off: both are Linux-only (/proc + AF_UNIX, /sys powercap).
          cargo build --release -p tab-atelier \
            --no-default-features --features headless \
            --bin tab-atelier-headless

      - name: Install WiX 3 toolset
        shell: pwsh
        run: |
          # cargo-wix drives WiX 3 (candle/light); pull the standalone
          # binaries and put them on PATH. Bump the tag if WiX moves.
          $url = "https://github.com/wixtoolset/wix3/releases/download/wix3141rtm/wix314-binaries.zip"
          Invoke-WebRequest -Uri $url -OutFile "$env:RUNNER_TEMP\wix.zip"
          Expand-Archive "$env:RUNNER_TEMP\wix.zip" -DestinationPath "$env:RUNNER_TEMP\wix"
          "$env:RUNNER_TEMP\wix" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Build MSI
        shell: bash
        run: |
          # Invoke candle/light directly, the same way windows-desktop.yml
          # does. cargo-wix 0.3 auto-harvests every wix/*.wxs in the
          # workspace, which collides with desktop.wxs (LGHT0089 multiple
          # entry sections); a direct candle invocation picks exactly one
          # source file and never sees its sibling.
          mkdir -p target/wix
          OUT="target/wix/tab-atelier-headless-${SHORT_SHA}-${MSI_VERSION}-x86_64.msi"
          candle.exe wix/main.wxs \
              -ext WixUtilExtension \
              -arch x64 \
              -dVersion="${MSI_VERSION}" \
              -dCargoTargetBinDir="target/release" \
              -out target/wix/main.wixobj
          light.exe target/wix/main.wixobj \
              -ext WixUtilExtension \
              -out "${OUT}"

      # End-to-end smoke test: install the MSI silently, then run the
      # installed binary with --check-crypto and --version. Catches
      # regressions where the MSI builds OK but the install fails (e.g.
      # missing dependency) OR the installed exe is broken (e.g. wrong
      # CRT linkage). Same role as the .deb integration test in
      # build.yml.
      - name: Install MSI + smoke-test the binary
        shell: pwsh
        run: |
          # MSI rejects forward slashes mid-path; Resolve-Path
          # normalises to fully-backslashed absolute (D:\a\... not
          # D:\a\tab-atelier\tab-atelier\target/wix\...).
          $msi = (Resolve-Path "target/wix/tab-atelier-headless-${env:SHORT_SHA}-${env:MSI_VERSION}-x86_64.msi").Path
          $log = "${env:RUNNER_TEMP}\msi-install.log"
          Write-Host "→ msiexec /i $msi /qn /L*v $log"
          $p = Start-Process msiexec -ArgumentList '/i', $msi, '/qn', '/L*v', $log -Wait -PassThru
          if ($p.ExitCode -ne 0) {
              Write-Host "── install log tail ────────────────────────"
              Get-Content $log -Tail 60
              throw "msiexec exited $($p.ExitCode)"
          }

          $exe = "C:\Program Files\tab-atelier\tab-atelier-headless.exe"
          if (!(Test-Path $exe)) {
              Write-Host "── install log tail ────────────────────────"
              Get-Content $log -Tail 60
              throw "binary missing after install: $exe"
          }

          Write-Host "→ $exe --version"
          & $exe --version
          if ($LASTEXITCODE -ne 0) { throw "--version exited $LASTEXITCODE" }

          Write-Host "→ $exe --check-crypto"
          & $exe --check-crypto
          if ($LASTEXITCODE -ne 0) { throw "--check-crypto exited $LASTEXITCODE" }

      # Windows-specific behaviour checks. The MSI doesn't just unpack
      # files: it registers a Windows service (LocalService account),
      # extends the system PATH, and the service's `Start="install"`
      # attribute means the daemon should be running by the time
      # msiexec returns. Each assertion below catches a real
      # post-install failure mode end users would hit before us.
      - name: Verify Windows service + PATH + HTTP API
        shell: pwsh
        run: |
          # 1. Service exists AND is in the Running state.
          $svc = Get-Service -Name 'tab-atelier-headless' -ErrorAction Stop
          Write-Host "→ Get-Service tab-atelier-headless → $($svc.Status)"
          if ($svc.Status -ne 'Running') {
              # Surface the Application event log entries the service
              # would have written — far more useful than just a status
              # name. Filter to the last 10 minutes to stay focused.
              Write-Host "── recent Application event log ─────────────"
              Get-EventLog -LogName Application -After (Get-Date).AddMinutes(-10) `
                  -ErrorAction SilentlyContinue `
                | Where-Object { $_.Source -like '*tab-atelier*' -or $_.Message -like '*tab-atelier*' } `
                | Select-Object -First 20 TimeGenerated, EntryType, Source, Message `
                | Format-List
              throw "service status was '$($svc.Status)', expected 'Running'"
          }

          # 2. PATH was updated and a fresh process can resolve the
          # binary by name (not just by absolute path). The system
          # PATH change took effect immediately for new processes;
          # use [System.Environment]::GetEnvironmentVariable to read
          # the up-to-date machine value rather than this shell's
          # frozen-at-launch copy.
          $machinePath = [System.Environment]::GetEnvironmentVariable('Path', 'Machine')
          $env:Path = "$machinePath;$env:Path"
          $resolved = Get-Command 'tab-atelier-headless.exe' -ErrorAction Stop
          Write-Host "→ Get-Command tab-atelier-headless.exe → $($resolved.Source)"
          if ($resolved.Source -notlike '*Program Files\tab-atelier*') {
              throw "binary resolved off PATH but from unexpected location: $($resolved.Source)"
          }

          # 3. HTTP API is accepting TCP connections on 7890. Up to 6
          # one-second polls so a slow service start doesn't flake.
          $apiUp = $false
          for ($i = 0; $i -lt 6; $i++) {
              $t = Test-NetConnection -ComputerName 127.0.0.1 -Port 7890 -WarningAction SilentlyContinue
              if ($t.TcpTestSucceeded) { $apiUp = $true; break }
              Start-Sleep -Seconds 1
          }
          if (-not $apiUp) {
              throw "HTTP API not accepting connections on 127.0.0.1:7890 after 6s"
          }
          Write-Host "→ TCP 127.0.0.1:7890 — accepting connections"

          # 4. Unauthenticated request must return 401, NOT a connection
          # error. Proves the daemon's HTTP server is actually
          # parsing requests, not just listening.
          try {
              $r = Invoke-WebRequest -Uri 'http://127.0.0.1:7890/tabs' `
                  -UseBasicParsing -ErrorAction Stop -TimeoutSec 5
              throw "GET /tabs unauthenticated returned $($r.StatusCode), expected 401"
          } catch [System.Net.WebException] {
              $code = [int]$_.Exception.Response.StatusCode
              if ($code -ne 401) {
                  throw "GET /tabs unauthenticated returned $code, expected 401"
              }
              Write-Host "→ GET /tabs unauthenticated → 401 (expected)"
          }

      # archive: false emits the .msi as-is (single raw file), not wrapped
      # in the usual artifact .zip. Requires exactly one matched file.
      - name: Upload MSI artifact (raw)
        uses: actions/upload-artifact@v7
        with:
          name: tab-atelier-headless-msi-${{ env.SHORT_SHA }}
          path: target/wix/tab-atelier-headless-${{ env.SHORT_SHA }}-${{ env.MSI_VERSION }}-x86_64.msi
          archive: false
          if-no-files-found: error

      # Final exit gate: the uninstall flow must also work. A future
      # GUID drift / orphaned-component bug would only surface here.
      - name: Uninstall MSI + verify cleanup
        shell: pwsh
        run: |
          $msi = (Resolve-Path "target/wix/tab-atelier-headless-${env:SHORT_SHA}-${env:MSI_VERSION}-x86_64.msi").Path
          $log = "${env:RUNNER_TEMP}\msi-uninstall.log"
          Write-Host "→ msiexec /x $msi /qn /L*v $log"
          $p = Start-Process msiexec -ArgumentList '/x', $msi, '/qn', '/L*v', $log -Wait -PassThru
          if ($p.ExitCode -ne 0) {
              Write-Host "── uninstall log tail ──────────────────────"
              Get-Content $log -Tail 60
              throw "msiexec /x exited $($p.ExitCode)"
          }

          # Service gone.
          $svc = Get-Service -Name 'tab-atelier-headless' -ErrorAction SilentlyContinue
          if ($null -ne $svc) {
              throw "service still registered after uninstall: $($svc.Status)"
          }
          Write-Host "→ service unregistered"

          # Binary gone.
          $exe = "C:\Program Files\tab-atelier\tab-atelier-headless.exe"
          if (Test-Path $exe) {
              throw "binary still present after uninstall: $exe"
          }
          Write-Host "→ binary removed"

          # Port no longer listening — proves the service stopped
          # cleanly during uninstall, not just got force-killed.
          $t = Test-NetConnection -ComputerName 127.0.0.1 -Port 7890 -WarningAction SilentlyContinue
          if ($t.TcpTestSucceeded) {
              throw "port 7890 still listening after uninstall — daemon process leaked"
          }
          Write-Host "→ port 7890 no longer listening"
