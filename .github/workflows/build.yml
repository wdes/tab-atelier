name: Build

on: [push, pull_request]

permissions:
    contents: read

env:
    GRCOV_VERSION: "0.10.5"
    RUST_VERSION: "1.95.0"

jobs:
    build:
        name: Build & test & lint
        runs-on: ubuntu-latest
        outputs:
            deb-artifact-id: ${{ steps.upload-deb.outputs.artifact-id }}
        steps:
            - uses: actions/checkout@v6
            - name: Install system dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y --no-install-recommends \
                      libvulkan-dev \
                      libwayland-dev \
                      libxkbcommon-dev \
                      libxkbcommon-x11-dev \
                      libx11-dev \
                      libxcb1-dev \
                      libxcb-render0-dev \
                      libxcb-shm0-dev \
                      libxcb-xkb-dev \
                      libfontconfig-dev \
                      libfreetype-dev
            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable
              with:
                  toolchain: ${{ env.RUST_VERSION }}
                  components: clippy, rustfmt, llvm-tools
            - name: Cache cargo artifacts
              uses: Swatinem/rust-cache@v2
            - name: Build without energy feature
              run: cargo check --locked --no-default-features
            - name: Build
              run: cargo build --locked --all-targets
              env:
                  CARGO_INCREMENTAL: "0"
                  RUSTFLAGS: "-Cinstrument-coverage"
                  RUSTDOCFLAGS: "-Cinstrument-coverage"
            - name: Run tests
              run: cargo test --locked --all-targets --no-fail-fast
              env:
                  CARGO_INCREMENTAL: "0"
                  RUSTFLAGS: "-Cinstrument-coverage"
                  RUSTDOCFLAGS: "-Cinstrument-coverage"
            - name: Check formatting
              run: cargo fmt -- --check
            - name: Clippy
              run: cargo clippy --all-targets --locked -- -D warnings
            - name: Install grcov
              run: |
                  mkdir -p "${HOME}/.local/bin"
                  curl -sL https://github.com/mozilla/grcov/releases/download/v${GRCOV_VERSION}/grcov-x86_64-unknown-linux-gnu.tar.bz2 | tar jxf - -C "${HOME}/.local/bin"
                  echo "$HOME/.local/bin" >> $GITHUB_PATH
            - name: Run grcov
              run: grcov . --binary-path target/debug/deps/ -s . -t lcov --branch --ignore-not-existing --ignore '../**' --ignore '/*' -o coverage.lcov
            - uses: codecov/codecov-action@v5
              with:
                  files: ./coverage.lcov
                  flags: rust
                  fail_ci_if_error: true
                  token: ${{ secrets.CODECOV_TOKEN }}
            - name: Build .deb package
              run: cargo install cargo-deb && cargo deb --locked
            - name: Upload .deb package
              id: upload-deb
              uses: actions/upload-artifact@v7
              with:
                  name: tab-atelier-deb
                  path: target/debian/*.deb
                  retention-days: 5
                  archive: false

    integration:
        name: Integration test (debian:trixie-slim)
        runs-on: ubuntu-latest
        needs: build
        steps:
            - uses: actions/download-artifact@v8
              with:
                  artifact-ids: ${{ needs.build.outputs.deb-artifact-id }}
                  merge-multiple: true
                  skip-decompress: true
            - name: Install .deb and run --check
              run: |
                  docker run --rm \
                      -v "$PWD:/debs:ro" \
                      debian:trixie-slim \
                      sh -c "apt-get update \
                          && apt-get install -y --no-install-recommends /debs/*.deb \
                          && tab-atelier --check"
