name: Build

# push is main-only: `on: [push, pull_request]` ran everything twice
# per PR commit (once per event), and tag pushes are already covered by
# release.yml + apt-publish.
on:
    push:
        branches: [main]
    pull_request:

# main is never cancelled — its runs publish the codecov base.
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
    contents: read

env:
    GRCOV_VERSION: "0.10.5"
    RUST_VERSION: "1.95.0"

jobs:
    build:
        name: Build & test & lint
        runs-on: ubuntu-latest
        outputs:
            deb-artifact-id: ${{ steps.upload-deb.outputs.artifact-id }}
        steps:
            - uses: actions/checkout@v7
            # ubuntu-latest's ~14 GB free isn't enough for the coverage
            # + headless + release targets (a prior run died with "No
            # space left on device" mid-clippy). Backgrounded: the space
            # isn't needed until the first cargo step, minutes away.
            - name: Free disk space (background)
              run: |
                  sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/.ghcup &
                  echo "→ freeing ~30 GB in the background (pid $!)"
            - name: Install system dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y --no-install-recommends \
                      build-essential \
                      libvulkan-dev \
                      libwayland-dev \
                      libxkbcommon-dev \
                      libxkbcommon-x11-dev \
                      libx11-dev \
                      libxcb1-dev \
                      libxcb-render0-dev \
                      libxcb-shm0-dev \
                      libxcb-xkb-dev \
                      libfontconfig-dev \
                      libfreetype-dev
            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable
              with:
                  toolchain: ${{ env.RUST_VERSION }}
                  components: clippy, rustfmt, llvm-tools
            - name: Cache cargo artifacts
              uses: Swatinem/rust-cache@v2
              with:
                  # Per-branch multi-GB saves evict main's entry from the
                  # repo's 10 GB cache budget; PR runs restore main's.
                  save-if: ${{ github.ref == 'refs/heads/main' }}
            - name: Build without energy feature
              run: cargo check --locked --no-default-features --features gui
            - name: Build
              run: cargo build --locked --all-targets
              env:
                  CARGO_INCREMENTAL: "0"
                  RUSTFLAGS: "-Cinstrument-coverage"
                  RUSTDOCFLAGS: "-Cinstrument-coverage"
            - name: Build headless
              run: cargo build --locked --no-default-features --features headless,energy
            - name: Run tests
              run: cargo test --locked --all-targets --no-fail-fast
              env:
                  CARGO_INCREMENTAL: "0"
                  RUSTFLAGS: "-Cinstrument-coverage"
                  RUSTDOCFLAGS: "-Cinstrument-coverage"
            # Feature set must match the build/clippy steps above (and
            # the shipped headless .deb) — a differing set compiles the
            # whole crate graph once more just for this step.
            - name: Run headless tests
              run: cargo test --locked --no-default-features --features headless,energy --no-fail-fast
            - name: Check formatting
              run: cargo fmt -- --check
            - name: Clippy (GUI)
              run: cargo clippy --all-targets --locked -- -D warnings
            - name: Clippy (headless)
              run: cargo clippy --no-default-features --features headless,energy --all-targets --locked -- -D warnings
            - name: Install grcov
              run: |
                  mkdir -p "${HOME}/.local/bin"
                  curl -sL https://github.com/mozilla/grcov/releases/download/v${GRCOV_VERSION}/grcov-x86_64-unknown-linux-gnu.tar.bz2 | tar jxf - -C "${HOME}/.local/bin"
                  echo "$HOME/.local/bin" >> $GITHUB_PATH
            - name: Run grcov
              run: grcov . --binary-path target/debug/deps/ -s . -t lcov --branch --ignore-not-existing --ignore '../**' --ignore '/*' -o coverage.lcov
            - uses: codecov/codecov-action@v7
              # fail_ci_if_error stayed false after Codecov's GPG
              # verification step started failing intermittently on
              # fresh runners ("Can't check signature: No public key"
              # — keyserver lookup race). Coverage is informational;
              # build correctness is verified upstream by clippy +
              # tests + the integration job.
              with:
                  files: ./coverage.lcov
                  flags: rust
                  fail_ci_if_error: false
                  token: ${{ secrets.CODECOV_TOKEN }}
            - name: Build .deb packages (smoke-test only)
              # These debs only feed the integration job below; users
              # install the ones apt-publish.yml / release.yml build
              # with the real fat-LTO profile. Env (not Cargo.toml) so
              # the target/release/ asset paths stay valid.
              env:
                  CARGO_PROFILE_RELEASE_LTO: "off"
                  CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "16"
              run: |
                  cargo install cargo-deb --locked
                  cargo deb -p tab-atelier --locked
                  cargo deb -p tab-atelier --variant headless --locked
            - name: Upload .deb packages
              id: upload-deb
              uses: actions/upload-artifact@v7
              with:
                  name: tab-atelier-deb
                  path: target/debian/*.deb
                  retention-days: 5
                  # Two .deb files now (GUI + headless). upload-artifact@v7
                  # with `archive: false` requires exactly one file; default
                  # (archive: true) bundles them into a zip that the
                  # download step unpacks on its end.

    integration:
        name: Integration test (debian:trixie-slim)
        runs-on: ubuntu-latest
        needs: build
        steps:
            - uses: actions/download-artifact@v8
              with:
                  artifact-ids: ${{ needs.build.outputs.deb-artifact-id }}
                  merge-multiple: true
            - name: Install .deb and run --check-crypto
              run: |
                  # The two variants ship with `Conflicts:` against
                  # each other (Cargo.toml metadata.deb), so installing
                  # both at once breaks apt's solver. Install + probe
                  # them sequentially. The GUI variant's --check-crypto
                  # works headless because it only spins up rustls,
                  # not gpui.
                  docker run --rm \
                      -v "$PWD:/debs:ro" \
                      debian:trixie-slim \
                      sh -c "apt-get update \
                          && apt-get install -y --no-install-recommends /debs/tab-atelier-headless_*.deb \
                          && tab-atelier-headless --check-crypto \
                          && apt-get remove -y --purge tab-atelier-headless \
                          && apt-get install -y --no-install-recommends /debs/tab-atelier_*.deb \
                          && tab-atelier --check-crypto"
