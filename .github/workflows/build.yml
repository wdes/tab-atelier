name: Build

on: [push, pull_request]

permissions:
    contents: read

jobs:
    test:
        name: Rust tests
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - name: Install system dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y --no-install-recommends \
                      libvulkan-dev \
                      libwayland-dev \
                      libxkbcommon-dev \
                      libxkbcommon-x11-dev \
                      libx11-dev \
                      libxcb1-dev \
                      libxcb-render0-dev \
                      libxcb-shm0-dev \
                      libxcb-xkb-dev \
                      libfontconfig-dev \
                      libfreetype-dev
            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable
            - name: Cache cargo artifacts
              uses: Swatinem/rust-cache@v2
            - name: Run tests
              run: cargo test --locked --all-targets

    lint:
        name: Rust lint
        runs-on: ubuntu-latest
        needs: test
        steps:
            - uses: actions/checkout@v6
            - name: Install system dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y --no-install-recommends \
                      libvulkan-dev \
                      libwayland-dev \
                      libxkbcommon-dev \
                      libxkbcommon-x11-dev \
                      libx11-dev \
                      libxcb1-dev \
                      libxcb-render0-dev \
                      libxcb-shm0-dev \
                      libxcb-xkb-dev \
                      libfontconfig-dev \
                      libfreetype-dev
            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable
              with:
                  components: clippy, rustfmt
            - name: Cache cargo artifacts
              uses: Swatinem/rust-cache@v2
            - name: Check formatting
              run: cargo fmt -- --check
            - name: Clippy
              run: cargo clippy --all-targets --locked -- -D warnings
