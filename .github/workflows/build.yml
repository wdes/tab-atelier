name: Build

on: [push, pull_request]

permissions:
    contents: read

jobs:
    build:
        name: Build & test & lint
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - name: Install system dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y --no-install-recommends \
                      libvulkan-dev \
                      libwayland-dev \
                      libxkbcommon-dev \
                      libxkbcommon-x11-dev \
                      libx11-dev \
                      libxcb1-dev \
                      libxcb-render0-dev \
                      libxcb-shm0-dev \
                      libxcb-xkb-dev \
                      libfontconfig-dev \
                      libfreetype-dev
            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable
              with:
                  components: clippy, rustfmt
            - name: Cache cargo artifacts
              uses: Swatinem/rust-cache@v2
            - name: Build without energy feature
              run: cargo check --locked --no-default-features
            - name: Run tests
              run: cargo test --locked --all-targets
            - name: Check formatting
              run: cargo fmt -- --check
            - name: Clippy
              run: cargo clippy --all-targets --locked -- -D warnings
            - name: Build .deb package
              run: cargo install cargo-deb && cargo deb --locked
            - name: Upload .deb package
              uses: actions/upload-artifact@v6
              with:
                  name: tab-atelier-deb
                  path: target/debian/*.deb
                  retention-days: 5
                  archive: false

    integration:
        name: Integration test (debian:trixie-slim)
        runs-on: ubuntu-latest
        needs: build
        steps:
            - uses: actions/download-artifact@v7
              with:
                  name: tab-atelier-deb
            - name: Install .deb and run --check
              run: |
                  docker run --rm \
                      -v "$PWD:/debs:ro" \
                      debian:trixie-slim \
                      sh -c "apt-get update \
                          && apt-get install -y --no-install-recommends /debs/*.deb \
                          && tab-atelier --check"
