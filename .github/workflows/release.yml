name: Release

on:
    push:
        tags:
            - "v*"

# Top-level permissions default to no access; each job grants the
# minimum it actually needs (`build` writes attestations + id-token
# for SLSA provenance, `release` writes contents to draft the
# GitHub release). Per-job scoping means a compromised job can't
# escalate beyond what it was asked to do.
permissions: {}

jobs:
    build:
        name: Build release artifacts
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write       # sign attestations via Sigstore
            attestations: write   # store the resulting provenance
        steps:
            - uses: actions/checkout@v7
            - name: Install system dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y --no-install-recommends \
                      build-essential \
                      libvulkan-dev \
                      libwayland-dev \
                      libxkbcommon-dev \
                      libxkbcommon-x11-dev \
                      libx11-dev \
                      libxcb1-dev \
                      libxcb-render0-dev \
                      libxcb-shm0-dev \
                      libxcb-xkb-dev \
                      libfontconfig-dev \
                      libfreetype-dev
            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable
            - name: Cache cargo artifacts
              uses: Swatinem/rust-cache@v2
            - name: Build .deb packages
              run: |
                  cargo install cargo-deb
                  cargo deb -p tab-atelier --locked
                  cargo deb -p tab-atelier --variant headless --locked
            - name: Attest .deb
              uses: actions/attest-build-provenance@v4
              with:
                  subject-path: target/debian/*.deb
            - name: Upload .deb artifact
              uses: actions/upload-artifact@v7
              with:
                  name: tab-atelier-deb
                  path: target/debian/*.deb
                  # Two .deb files (GUI + headless); upload-artifact's
                  # `archive: false` requires exactly one. Default
                  # `archive: true` bundles them into the artifact zip.

    release:
        name: Create draft release
        runs-on: ubuntu-latest
        needs: build
        permissions:
            contents: write       # create the draft release
        steps:
            - uses: actions/download-artifact@v8
              with:
                  name: tab-atelier-deb
            - name: Create draft release
              uses: softprops/action-gh-release@v3
              with:
                  draft: true
                  generate_release_notes: true
                  files: "*.deb"
