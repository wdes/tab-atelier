name: windows-desktop

# Probe + (eventually) build the DESKTOP GUI variant for Windows.
#
# Step 1 (passed): `cargo check --features gui` on windows-msvc — proved
# gpui 0.2 compiles on Windows AND our crate type-checks once the
# catbus + Pty::child Unix usages were gated out.
#
# Step 2 (now): full `cargo build --release` of the GUI bin. Codegen +
# linker surface issues that `check` doesn't (DirectX/Vulkan adapter
# symbols, blade backend native code). Once green, this workflow grows
# WiX packaging like windows-msi.yml.
#
# energy is left off (power.rs reads /sys, Linux-only); catbus is off
# on Windows (default feature on Linux only — see Cargo.toml).

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust (stable, MSVC)
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: cargo build — desktop GUI on Windows
        shell: bash
        run: |
          cargo build --release -p tab-atelier \
            --no-default-features --features gui \
            --bin tab-atelier
